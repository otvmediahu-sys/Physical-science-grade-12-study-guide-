<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyPro SA</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff}
header{padding:20px;background:linear-gradient(90deg,#2563eb,#7c3aed);text-align:center}
.container{padding:20px}

.banner{
background:url('https://images.unsplash.com/photo-1532094349884-543bc11b234d') center/cover;
height:180px;border-radius:12px;margin-bottom:20px;
display:flex;align-items:center;justify-content:center
}
.banner h2{background:rgba(0,0,0,0.6);padding:10px;border-radius:8px}

.section{margin-bottom:30px}
.row{display:flex;overflow-x:auto;gap:15px}

.card{
min-width:250px;
background:#1e293b;
border-radius:12px;
padding:15px;
transition:0.3s
}
.card:hover{transform:scale(1.05);background:#334155}

button{
padding:10px;border:none;border-radius:8px;
background:#22c55e;color:#fff;width:100%;margin-top:10px;cursor:pointer
}

input{
padding:10px;width:100%;margin:5px 0;border-radius:6px;border:none
}

.hidden{display:none}
</style>
</head>

<body>

<header>
<h1>🎬 StudyPro SA</h1>
<p>Grade 12 Physical Science • Learn Smart</p>
</header>

<div class="container">

<div class="banner">
<h2>Unlock Full Course for R49</h2>
</div>

<!-- LOGIN -->
<div id="authBox">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">
<p id="userInfo"></p>
<button onclick="payNow()">💳 Pay with Yoco</button>

<input id="accessCode" placeholder="Enter Access Code">
<button onclick="verifyCode()">Unlock Course</button>

<button onclick="logout()">Logout</button>
</div>

<!-- CONTENT -->
<div id="content" class="hidden">

<div class="section">
<h2>⚡ Physics</h2>
<div class="row">
<div class="card">
<h3>Mechanics</h3>
<p>Motion & Forces</p>
<button onclick="playVideo('https://www.youtube.com/embed/2u6Z6l5P9Kk')">Watch</button>
</div>

<div class="card">
<h3>Momentum</h3>
<p>Collisions</p>
<button onclick="playVideo('https://www.youtube.com/embed/7dZgJH4qC6k')">Watch</button>
</div>
</div>
</div>

<div class="section">
<h2>⚗️ Chemistry</h2>
<div class="row">
<div class="card">
<h3>Organic</h3>
<p>Hydrocarbons</p>
<button onclick="playVideo('https://www.youtube.com/embed/5bLk8k3w3pI')">Watch</button>
</div>

<div class="card">
<h3>Acids & Bases</h3>
<p>pH & Titration</p>
<button onclick="playVideo('https://www.youtube.com/embed/3C8h4lZ2k3s')">Watch</button>
</div>
</div>
</div>

<!-- PLAYER -->
<div id="player" class="hidden">
<h2>🎥 Lesson</h2>
<iframe id="videoFrame" width="100%" height="300"></iframe>
</div>

<!-- DOWNLOADS -->
<div class="section">
<h2>📥 Downloads</h2>
<a href="https://www.africanexamresources.com/wp-content/uploads/physics-grade12.pdf" target="_blank">
<button>Download Physics PDF</button>
</a>
<a href="https://www.africanexamresources.com/wp-content/uploads/chemistry-grade12.pdf" target="_blank">
<button>Download Chemistry PDF</button>
</a>
</div>

</div>

</div>

<script>

// ========================
// CONFIG
// ========================

// 🔑 CHANGE THIS CODE (your access code)
const VALID_CODE = "SCIENCE2026";

// ========================
// AUTH SYSTEM
// ========================

function login(){
const email = document.getElementById('email').value;
if(!email){alert("Enter email");return}

localStorage.setItem("user", email);
showDashboard();
}

function logout(){
localStorage.clear();
location.reload();
}

// ========================
// PAYMENT
// ========================

function payNow(){
window.location.href = "https://pay.yoco.com/YOUR-LINK";
}

// ========================
// ACCESS CONTROL
// ========================

function verifyCode(){
const code = document.getElementById("accessCode").value;

if(code === VALID_CODE){
localStorage.setItem("paid","true");
showContent();
alert("Access unlocked!");
}else{
alert("Invalid code");
}
}

// ========================
// UI CONTROL
// ========================

function showDashboard(){
document.getElementById("authBox").classList.add("hidden");
document.getElementById("dashboard").classList.remove("hidden");

const user = localStorage.getItem("user");
document.getElementById("userInfo").innerText = "Logged in as: " + user;

if(localStorage.getItem("paid")==="true"){
showContent();
}
}

function showContent(){
document.getElementById("content").classList.remove("hidden");
}

// ========================
// VIDEO PLAYER
// ========================

function playVideo(link){
if(localStorage.getItem("paid")!=="true"){
alert("Please unlock course first");
return;
}
document.getElementById("player").classList.remove("hidden");
document.getElementById("videoFrame").src = link;
}

// ========================
// AUTO LOAD
// ========================

window.onload = function(){
if(localStorage.getItem("user")){
showDashboard();
}
}

</script>

</body>
  </html>
